<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图像偏好评测</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f7f6f3;
  --surface: #ffffff;
  --surface2: #f2f0ec;
  --text: #18181b;
  --text2: #52525b;
  --text3: #a1a1aa;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.16);
  --accent: #1d4ed8;
  --accent-bg: #eff6ff;
  --green: #15803d;
  --green-bg: #f0fdf4;
  --green-border: #bbf7d0;
  --amber: #92400e;
  --amber-bg: #fffbeb;
  --amber-border: #fde68a;
  --purple: #6d28d9;
  --purple-bg: #f5f3ff;
  --purple-border: #ddd6fe;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
  --radius: 12px;
  --radius-lg: 20px;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── HEADER ── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  flex-shrink: 0;
}
.header-inner {
  max-width: 860px;
  margin: 0 auto;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 1.5rem;
}
.header-logo {
  font-family: 'DM Serif Display', serif;
  font-size: 16px;
  flex-shrink: 0;
}
.header-logo span { color: var(--accent); }
.progress-wrap { flex: 1; display: flex; align-items: center; gap: 10px; }
.progress-bar { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.progress-inner { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }
.progress-label { font-size: 13px; color: var(--text3); white-space: nowrap; }

/* ── SCREEN SYSTEM ── */
.screen { display: none; flex: 1; }
.screen.active { display: flex; }

/* ── INTRO SCREEN ── */
#introScreen {
  align-items: center;
  justify-content: center;
  padding: 2rem;
}
.intro-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 3rem;
  max-width: 640px;
  width: 100%;
  box-shadow: var(--shadow);
}
.intro-tag {
  display: inline-block;
  background: var(--accent-bg);
  color: var(--accent);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 20px;
  margin-bottom: 16px;
}
.intro-card h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 30px;
  font-weight: 400;
  margin-bottom: 14px;
  line-height: 1.2;
}
.intro-card p {
  font-size: 15px;
  color: var(--text2);
  line-height: 1.7;
  margin-bottom: 1.75rem;
}
.criteria-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 2rem; }
.crit-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 14px;
  background: var(--bg);
  border-radius: var(--radius);
  border: 1px solid var(--border);
}
.crit-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
.crit-text strong { font-size: 13px; font-weight: 500; display: block; margin-bottom: 2px; }
.crit-text span { font-size: 13px; color: var(--text2); }
.start-btn {
  width: 100%;
  padding: 14px;
  background: var(--text);
  color: #fff;
  border: none;
  border-radius: 40px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.start-btn:hover { background: #27272a; transform: translateY(-1px); box-shadow: var(--shadow); }

/* ── QUESTION SCREEN ── */
#questionScreen {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 1.5rem 1.5rem 2rem;
}

.q-wrap {
  width: 100%;
  max-width: 860px;
  position: relative;
}

.q-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  overflow: hidden;
  transition: opacity 0.22s ease, transform 0.22s ease;
}
.q-card.fade-out { opacity: 0; transform: translateX(-32px); }
.q-card.fade-in  { animation: fadeInRight 0.25s ease forwards; }
@keyframes fadeInRight {
  from { opacity: 0; transform: translateX(32px); }
  to   { opacity: 1; transform: translateX(0); }
}

.q-prompt-bar {
  padding: 1.1rem 1.75rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}
.q-num-badge {
  background: var(--surface2);
  color: var(--text2);
  font-size: 11px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
}
.q-prompt-text {
  font-size: 14px;
  color: var(--text2);
  line-height: 1.5;
}
.q-prompt-text strong { color: var(--text); font-weight: 500; }

.q-images {
  display: grid;
  grid-template-columns: 1fr 1fr;
}
.q-img-col { position: relative; }
.q-img-col:first-child { border-right: 1px solid var(--border); }
.q-img-wrap { position: relative; background: var(--surface2); overflow: hidden; }
.q-img-wrap img {
  width: 100%;
  aspect-ratio: 1/1;
  object-fit: contain;
  background: #000;
  display: block;
}
.img-label {
  position: absolute;
  top: 10px; left: 10px;
  background: rgba(0,0,0,0.52);
  color: #fff;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.06em;
  padding: 3px 10px;
  border-radius: 20px;
  backdrop-filter: blur(4px);
}

.q-voting {
  padding: 1rem 1.75rem 1.25rem;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.vote-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.vote-dim {
  width: 148px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
}
.dim-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.vote-choices { display: flex; gap: 6px; flex: 1; }
.vchoice {
  flex: 1;
  padding: 7px 0;
  border: 1.5px solid var(--border2);
  border-radius: 8px;
  background: var(--surface);
  color: var(--text2);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.14s;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.vchoice:hover { background: var(--surface2); }
.vchoice .ck { display: none; font-size: 11px; }

.vchoice.on-appeal  { background: var(--green-bg);  border-color: var(--green);  color: var(--green);  }
.vchoice.on-align   { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }
.vchoice.on-overall { background: var(--purple-bg); border-color: var(--purple); color: var(--purple); }
.vchoice.on-appeal .ck,
.vchoice.on-align .ck,
.vchoice.on-overall .ck { display: inline; }

.vtie {
  padding: 7px 12px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  color: var(--text3);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.14s;
  white-space: nowrap;
}
.vtie:hover { background: var(--surface2); color: var(--text2); }
.vtie.on-appeal, .vtie.on-align, .vtie.on-overall {
  background: var(--amber-bg); border-color: var(--amber-border); color: var(--amber);
}

.q-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 1.25rem;
  padding: 0 0.25rem;
}
.nav-dots {
  display: flex;
  gap: 5px;
  flex: 1;
  justify-content: center;
  flex-wrap: wrap;
  max-width: 420px;
  padding: 0 1rem;
}
.nav-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--border2);
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
}
.nav-dot:hover { transform: scale(1.4); }
.nav-dot.done { background: var(--accent); }
.nav-dot.current { background: var(--text); transform: scale(1.3); }

.nav-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 9px 20px;
  border-radius: 40px;
  border: 1.5px solid var(--border2);
  background: var(--surface);
  color: var(--text2);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.nav-btn:hover:not(:disabled) { background: var(--surface2); color: var(--text); }
.nav-btn:disabled { opacity: 0.3; cursor: default; }
.nav-btn.primary {
  background: var(--text);
  border-color: var(--text);
  color: #fff;
}
.nav-btn.primary:hover:not(:disabled) { background: #27272a; }
.nav-btn.primary:disabled { background: var(--text3); border-color: var(--text3); opacity: 1; }

/* ── RESULT SCREEN ── */
#resultScreen {
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 3rem 2rem;
}
.result-inner { max-width: 700px; width: 100%; }
.result-header { text-align: center; margin-bottom: 2.5rem; }
.result-icon {
  width: 60px; height: 60px;
  background: var(--green-bg);
  border: 1px solid var(--green-border);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 1.25rem;
}
.result-title {
  font-family: 'DM Serif Display', serif;
  font-size: 26px; font-weight: 400;
  margin-bottom: 6px;
}
.result-sub { font-size: 14px; color: var(--text2); }

.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 1.5rem;
}
.stat-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem 1rem;
  text-align: center;
}
.stat-dim-label {
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--text3);
  margin-bottom: 10px;
}
.stat-bars {
  display: flex; gap: 6px; justify-content: center;
  align-items: flex-end; height: 44px; margin-bottom: 8px;
}
.sbar { width: 26px; border-radius: 3px 3px 0 0; min-height: 4px; }
.sbar.a { background: #bbf7d0; }
.sbar.b { background: #bfdbfe; }
.sbar.t { background: #fde68a; width: 18px; }
.stat-nums { display: flex; gap: 6px; justify-content: center; font-size: 12px; font-weight: 500; }
.sn-a { color: var(--green); }
.sn-b { color: var(--accent); }
.sn-t { color: var(--amber); }

.result-table {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 1.5rem;
}
.rt-head {
  display: grid;
  grid-template-columns: 36px 1fr 86px 86px 86px;
  gap: 6px;
  padding: 9px 14px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--text3);
}
.rt-scroll { max-height: 340px; overflow-y: auto; }
.rt-row {
  display: grid;
  grid-template-columns: 36px 1fr 86px 86px 86px;
  gap: 6px;
  padding: 9px 14px;
  border-bottom: 1px solid var(--border);
  align-items: center;
  font-size: 12px;
  cursor: pointer;
  transition: background 0.1s;
}
.rt-row:last-child { border-bottom: none; }
.rt-row:hover { background: var(--bg); }
.rt-n { color: var(--text3); font-size: 11px; }
.rt-p { color: var(--text); line-height: 1.4; }
.chip {
  display: inline-block; padding: 3px 7px;
  border-radius: 6px; font-size: 11px; font-weight: 500;
  text-align: center;
}
.ca { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
.cb { background: var(--accent-bg); color: var(--accent); border: 1px solid #bfdbfe; }
.ct { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }
.cn { background: var(--surface2); color: var(--text3); border: 1px solid var(--border); }

.result-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.btn-o {
  padding: 11px 26px; border-radius: 40px;
  border: 1.5px solid var(--border2); background: var(--surface);
  color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 14px; cursor: pointer; transition: background 0.15s;
}
.btn-o:hover { background: var(--surface2); }
.btn-f {
  padding: 11px 26px; border-radius: 40px;
  border: none; background: var(--text); color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; cursor: pointer; transition: background 0.15s;
}
.btn-f:hover { background: #27272a; }

@media (max-width: 580px) {
  .q-voting { padding: 0.875rem 1rem; }
  .vote-dim { width: 104px; font-size: 11px; }
  .intro-card { padding: 1.75rem; }
  .stats-row { grid-template-columns: 1fr; }
  .rt-head, .rt-row { grid-template-columns: 28px 1fr 70px 70px 70px; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="header-logo">人类<span>评测</span></div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-inner" id="pBar"></div></div>
      <div class="progress-label" id="pLabel">0 / 50</div>
    </div>
  </div>
</header>

<!-- ── INTRO ── -->
<div class="screen active" id="introScreen">
  <div class="intro-card">
    <div class="intro-tag">用户研究 · 文本生成图像</div>
    <h1>图像偏好评测</h1>
    <p>
      本问卷将依次展示 <strong>50 组图片</strong>，每组的两张图由两个不同的模型根据 <strong>同一段文字描述</strong> 生成。请针对每一组从下面三个独立维度做出选择。
    </p>
    <div class="criteria-list">
      <div class="crit-row">
        <div class="crit-dot" style="background:#15803d;"></div>
        <div class="crit-text">
          <strong>视觉吸引力</strong>
          <span>哪张图在视觉上更美观、更耐看（不考虑是否符合描述）？</span>
        </div>
      </div>
      <div class="crit-row">
        <div class="crit-dot" style="background:#1d4ed8;"></div>
        <div class="crit-text">
          <strong>描述匹配度</strong>
          <span>哪张图更准确地呈现了文字描述里的内容？</span>
        </div>
      </div>
      <div class="crit-row">
        <div class="crit-dot" style="background:#6d28d9;"></div>
        <div class="crit-text">
          <strong>综合偏好</strong>
          <span>综合所有方面，你整体上更喜欢哪张？</span>
        </div>
      </div>
    </div>
    <button class="start-btn" onclick="startSurvey()">
      开始评测
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
</div>

<!-- ── QUESTION ── -->
<div class="screen" id="questionScreen">
  <div class="q-wrap">

    <div class="q-card" id="qCard">
      <div class="q-prompt-bar">
        <div class="q-num-badge" id="qNumBadge">第 1 题 / 50</div>
        <div class="q-prompt-text" id="qPromptText"></div>
      </div>
      <div class="q-images">
        <div class="q-img-col">
          <div class="q-img-wrap">
            <img id="imgA" src="" alt="图片 A" />
            <div class="img-label">图片 A</div>
          </div>
        </div>
        <div class="q-img-col">
          <div class="q-img-wrap">
            <img id="imgB" src="" alt="图片 B" />
            <div class="img-label">图片 B</div>
          </div>
        </div>
      </div>
      <div class="q-voting">
        <div class="vote-row">
          <div class="vote-dim"><div class="dim-dot" style="background:#15803d;"></div>视觉吸引力</div>
          <div class="vote-choices">
            <button class="vchoice" id="v-appeal-a" onclick="vote('appeal','a')"><span class="ck">✓</span> 图片 A</button>
            <button class="vchoice" id="v-appeal-b" onclick="vote('appeal','b')"><span class="ck">✓</span> 图片 B</button>
          </div>
          <button class="vtie" id="v-appeal-tie" onclick="vote('appeal','tie')">差不多</button>
        </div>
        <div class="vote-row">
          <div class="vote-dim"><div class="dim-dot" style="background:#1d4ed8;"></div>描述匹配度</div>
          <div class="vote-choices">
            <button class="vchoice" id="v-align-a" onclick="vote('align','a')"><span class="ck">✓</span> 图片 A</button>
            <button class="vchoice" id="v-align-b" onclick="vote('align','b')"><span class="ck">✓</span> 图片 B</button>
          </div>
          <button class="vtie" id="v-align-tie" onclick="vote('align','tie')">差不多</button>
        </div>
        <div class="vote-row">
          <div class="vote-dim"><div class="dim-dot" style="background:#6d28d9;"></div>综合偏好</div>
          <div class="vote-choices">
            <button class="vchoice" id="v-overall-a" onclick="vote('overall','a')"><span class="ck">✓</span> 图片 A</button>
            <button class="vchoice" id="v-overall-b" onclick="vote('overall','b')"><span class="ck">✓</span> 图片 B</button>
          </div>
          <button class="vtie" id="v-overall-tie" onclick="vote('overall','tie')">差不多</button>
        </div>
      </div>
    </div>

    <div class="q-nav">
      <button class="nav-btn" id="prevBtn" onclick="goTo(cur-1)" disabled>
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M13 8H3M7 12L3 8l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        上一题
      </button>
      <div class="nav-dots" id="navDots"></div>
      <button class="nav-btn primary" id="nextBtn" onclick="handleNext()">
        下一题
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

  </div>
</div>

<!-- ── RESULT ── -->
<div class="screen" id="resultScreen">
  <div class="result-inner">
    <div class="result-header">
      <div class="result-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#15803d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <h2 class="result-title">评测完成</h2>
      <p class="result-sub">感谢参与！下方是你的回答汇总。</p>
    </div>

    <div class="stats-row" id="statsRow"></div>

    <div class="result-table">
      <div class="rt-head">
        <div>#</div><div>描述</div>
        <div>吸引力</div><div>匹配度</div><div>综合</div>
      </div>
      <div class="rt-scroll" id="rtBody"></div>
    </div>

    <div class="result-actions">
      <button class="btn-o" onclick="backToSurvey()">← 回看答案</button>
      <button class="btn-f" onclick="exportCSV()">导出 CSV</button>
      <button class="btn-f" onclick="copyJSON()">复制 JSON</button>
    </div>
  </div>
</div>

<script>
// Switch the asset host without re-uploading. After pushing this folder to GitHub,
// set BASE_URL to: 'https://cdn.jsdelivr.net/gh/<GH_USER>/<GH_REPO>@main/'
// Leave as '' to test locally (index.html next to human_eval_pairs/).
const BASE_URL = 'https://cdn.jsdelivr.net/gh/sophialanlan/map-pgmap-humaneva@main/';

const questions = [
  { prompt: "一只柴犬", imgA: "human_eval_pairs/q01_A.jpg", imgB: "human_eval_pairs/q01_B.jpg" },
  { prompt: "一把螺丝刀的素描", imgA: "human_eval_pairs/q02_A.jpg", imgB: "human_eval_pairs/q02_B.jpg" },
  { prompt: "一个里面有蜡烛的南瓜", imgA: "human_eval_pairs/q03_A.jpg", imgB: "human_eval_pairs/q03_B.jpg" },

const N = questions.length;
const DIMS = ['appeal', 'align', 'overall'];
const answers = questions.map(() => ({ appeal: null, align: null, overall: null }));
let cur = 0;

function startSurvey() {
  show('questionScreen');
  buildDots();
  renderQ(0, 'none');
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function buildDots() {
  const wrap = document.getElementById('navDots');
  wrap.innerHTML = '';
  questions.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'nav-dot';
    d.id = `dot-${i}`;
    d.title = `Question ${i + 1}`;
    d.onclick = () => goTo(i);
    wrap.appendChild(d);
  });
}

function renderQ(idx, dir) {
  cur = idx;
  const q = questions[idx];
  const card = document.getElementById('qCard');

  if (dir !== 'none') {
    card.style.opacity = '0';
    card.style.transform = dir === 'next' ? 'translateX(-28px)' : 'translateX(28px)';
  }

  setTimeout(() => {
    document.getElementById('qNumBadge').textContent = `第 ${idx + 1} 题 / ${N}`;
    document.getElementById('qPromptText').innerHTML = `描述：<strong>"${q.prompt}"</strong>`;
    document.getElementById('imgA').src = BASE_URL + q.imgA;
    document.getElementById('imgB').src = BASE_URL + q.imgB;

    DIMS.forEach(dim => {
      ['a', 'b', 'tie'].forEach(c => {
        const btn = document.getElementById(`v-${dim}-${c}`);
        if (!btn) return;
        btn.classList.remove(`on-${dim}`);
        if (answers[idx][dim] === c) btn.classList.add(`on-${dim}`);
      });
    });

    card.style.transition = 'none';
    card.style.opacity = '0';
    card.style.transform = dir === 'next' ? 'translateX(28px)' : (dir === 'prev' ? 'translateX(-28px)' : 'translateX(0)');
    requestAnimationFrame(() => {
      card.style.transition = 'opacity 0.22s ease, transform 0.22s ease';
      card.style.opacity = '1';
      card.style.transform = 'translateX(0)';
    });

    updateNav();
    updateProgress();
  }, dir === 'none' ? 0 : 80);
}

function vote(dim, choice) {
  answers[cur][dim] = choice;
  ['a', 'b', 'tie'].forEach(c => {
    const btn = document.getElementById(`v-${dim}-${c}`);
    btn.classList.remove(`on-${dim}`);
    if (c === choice) btn.classList.add(`on-${dim}`);
  });
  updateProgress();
  updateDots();

  const a = answers[cur];
  if (DIMS.every(d => a[d] !== null) && cur < N - 1) {
    setTimeout(() => goTo(cur + 1, 'next'), 340);
  }
}

function goTo(idx, dir) {
  if (idx < 0 || idx >= N) return;
  const direction = dir || (idx > cur ? 'next' : 'prev');
  renderQ(idx, direction);
}

function handleNext() {
  if (cur < N - 1) {
    goTo(cur + 1, 'next');
  } else {
    showResult();
  }
}

function updateNav() {
  document.getElementById('prevBtn').disabled = cur === 0;
  const nextBtn = document.getElementById('nextBtn');
  const allDone = answers.every(a => DIMS.every(d => a[d] !== null));

  if (cur === N - 1) {
    nextBtn.innerHTML = '提交 <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    nextBtn.disabled = !allDone;
  } else {
    nextBtn.innerHTML = '下一题 <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    nextBtn.disabled = false;
  }
  updateDots();
}

function updateDots() {
  questions.forEach((_, i) => {
    const d = document.getElementById(`dot-${i}`);
    if (!d) return;
    d.className = 'nav-dot';
    if (i === cur) d.classList.add('current');
    else if (DIMS.every(dim => answers[i][dim] !== null)) d.classList.add('done');
  });
}

function updateProgress() {
  const done = answers.filter(a => DIMS.every(d => a[d] !== null)).length;
  document.getElementById('pBar').style.width = (done / N * 100) + '%';
  document.getElementById('pLabel').textContent = `${done} / ${N}`;
  updateDots();
  updateNav();
}

function showResult() {
  const counts = { appeal:{a:0,b:0,tie:0}, align:{a:0,b:0,tie:0}, overall:{a:0,b:0,tie:0} };
  answers.forEach(a => DIMS.forEach(d => { if (a[d]) counts[d][a[d]]++; }));

  const dimLabels = { appeal: '视觉吸引力', align: '描述匹配度', overall: '综合偏好' };
  document.getElementById('statsRow').innerHTML = DIMS.map(d => {
    const {a,b,tie} = counts[d];
    const mx = Math.max(a,b,tie,1);
    const hA = Math.round(a/mx*40), hB = Math.round(b/mx*40), hT = Math.round(tie/mx*40);
    return `<div class="stat-box">
      <div class="stat-dim-label">${dimLabels[d]}</div>
      <div class="stat-bars">
        <div class="sbar a" style="height:${Math.max(hA,4)}px"></div>
        <div class="sbar b" style="height:${Math.max(hB,4)}px"></div>
        <div class="sbar t" style="height:${Math.max(hT,4)}px"></div>
      </div>
      <div class="stat-nums">
        <span class="sn-a">A:${a}</span>
        <span class="sn-b">B:${b}</span>
        <span class="sn-t">Tie:${tie}</span>
      </div>
    </div>`;
  }).join('');

  const chipCls = v => v==='a'?'ca':v==='b'?'cb':v==='tie'?'ct':'cn';
  const chipTxt = v => v==='a'?'图片 A':v==='b'?'图片 B':v==='tie'?'差不多':'—';
  document.getElementById('rtBody').innerHTML = questions.map((q,i) => {
    const a = answers[i];
    const short = q.prompt.length > 48 ? q.prompt.slice(0,48)+'…' : q.prompt;
    return `<div class="rt-row" onclick="goToQ(${i})">
      <div class="rt-n">${i+1}</div>
      <div class="rt-p">${short}</div>
      <div><span class="chip ${chipCls(a.appeal)}">${chipTxt(a.appeal)}</span></div>
      <div><span class="chip ${chipCls(a.align)}">${chipTxt(a.align)}</span></div>
      <div><span class="chip ${chipCls(a.overall)}">${chipTxt(a.overall)}</span></div>
    </div>`;
  }).join('');

  show('resultScreen');
}

function goToQ(i) {
  show('questionScreen');
  renderQ(i, 'none');
}

function backToSurvey() {
  show('questionScreen');
  renderQ(cur, 'none');
}

function exportCSV() {
  let csv = 'index,prompt,visual_appeal,prompt_alignment,overall_preference\n';
  questions.forEach((q,i) => {
    const a = answers[i];
    csv += `${i+1},"${q.prompt.replace(/"/g,'""')}",${a.appeal||''},${a.align||''},${a.overall||''}\n`;
  });
  const url = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
  const l = document.createElement('a');
  l.href=url; l.download='human_eval_results.csv'; l.click();
  URL.revokeObjectURL(url);
}

function copyJSON() {
  const data = questions.map((q,i) => ({
    index: i+1, prompt: q.prompt,
    visual_appeal: answers[i].appeal,
    prompt_alignment: answers[i].align,
    overall_preference: answers[i].overall
  }));
  navigator.clipboard.writeText(JSON.stringify(data,null,2)).then(() => {
    const btn = document.querySelector('.result-actions .btn-f:last-child');
    const orig = btn.textContent;
    btn.textContent = '已复制!';
    setTimeout(() => btn.textContent = orig, 2000);
  });
}
