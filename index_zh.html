<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图像偏好评测</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f7f6f3; --surface: #ffffff; --surface2: #f2f0ec;
  --text: #18181b; --text2: #52525b; --text3: #a1a1aa;
  --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.16);
  --accent: #1d4ed8; --accent-bg: #eff6ff;
  --green: #15803d; --green-bg: #f0fdf4; --green-border: #bbf7d0;
  --amber: #92400e; --amber-bg: #fffbeb; --amber-border: #fde68a;
  --shadow: 0 4px 24px rgba(0,0,0,0.08); --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
  --radius: 12px; --radius-lg: 20px;
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; flex-shrink: 0; }
.header-inner { max-width: 860px; margin: 0 auto; height: 56px; display: flex; align-items: center; gap: 1.5rem; }
.header-logo { font-family: 'DM Serif Display', serif; font-size: 16px; flex-shrink: 0; }
.header-logo span { color: var(--accent); }
.progress-wrap { flex: 1; display: flex; align-items: center; gap: 10px; }
.progress-bar { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.progress-inner { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }
.progress-label { font-size: 13px; color: var(--text3); white-space: nowrap; }

.screen { display: none; flex: 1; }
.screen.active { display: flex; }

#introScreen { align-items: center; justify-content: center; padding: 2rem; }
.intro-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 3rem; max-width: 640px; width: 100%; box-shadow: var(--shadow); }
.intro-tag { display: inline-block; background: var(--accent-bg); color: var(--accent); font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 10px; border-radius: 20px; margin-bottom: 16px; }
.intro-card h1 { font-family: 'DM Serif Display', serif; font-size: 30px; font-weight: 400; margin-bottom: 14px; line-height: 1.2; }
.intro-card p { font-size: 15px; color: var(--text2); line-height: 1.7; margin-bottom: 1.25rem; }
.intro-tip { font-size: 14px; color: var(--text); background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 2rem; line-height: 1.55; }
.intro-tip strong { color: var(--accent); }
.start-btn { width: 100%; padding: 14px; background: var(--text); color: #fff; border: none; border-radius: 40px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
.start-btn:hover { background: #27272a; transform: translateY(-1px); box-shadow: var(--shadow); }
.start-btn:disabled { background: var(--text3); cursor: wait; }

#questionScreen { flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem 1.5rem 2rem; }
.q-wrap { width: 100%; max-width: 920px; position: relative; }
.q-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow); overflow: hidden; transition: opacity 0.22s ease, transform 0.22s ease; }

.q-prompt-bar { padding: 1.1rem 1.75rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.q-num-badge { background: var(--surface2); color: var(--text2); font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
.q-prompt-text { font-size: 15px; color: var(--text2); line-height: 1.5; }
.q-prompt-text strong { color: var(--text); font-weight: 500; }

.q-images { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
.q-img-col { position: relative; cursor: pointer; transition: background 0.15s, transform 0.15s; user-select: none; }
.q-img-col:first-child { border-right: 1px solid var(--border); }
.q-img-col:hover { background: var(--accent-bg); }
.q-img-col:hover .img-pick { opacity: 1; transform: translate(-50%, -50%) scale(1); }
.q-img-col.picked { background: var(--green-bg); }
.q-img-col.picked .img-pick { opacity: 1; transform: translate(-50%, -50%) scale(1); background: var(--green); }
.q-img-wrap { position: relative; background: var(--surface2); overflow: hidden; }
.q-img-wrap img { width: 100%; aspect-ratio: 1/1; object-fit: contain; background: #000; display: block; pointer-events: none; }
.img-label { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.52); color: #fff; font-size: 12px; font-weight: 500; letter-spacing: 0.06em; padding: 3px 10px; border-radius: 20px; backdrop-filter: blur(4px); }
.img-pick { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8); width: 64px; height: 64px; border-radius: 50%; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; opacity: 0; transition: all 0.15s; pointer-events: none; box-shadow: 0 6px 24px rgba(0,0,0,0.25); }

.q-hint { padding: 0.9rem 1.75rem 1.1rem; border-top: 1px solid var(--border); text-align: center; font-size: 13px; color: var(--text3); }

.q-nav { display: flex; align-items: center; justify-content: space-between; margin-top: 1.25rem; padding: 0 0.25rem; }
.nav-dots { display: flex; gap: 4px; flex: 1; justify-content: center; flex-wrap: wrap; max-width: 580px; padding: 0 1rem; }
.nav-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border2); cursor: pointer; transition: background 0.2s, transform 0.15s; }
.nav-dot:hover { transform: scale(1.6); }
.nav-dot.done { background: var(--accent); }
.nav-dot.current { background: var(--text); transform: scale(1.4); }

.nav-btn { display: flex; align-items: center; gap: 6px; padding: 9px 20px; border-radius: 40px; border: 1.5px solid var(--border2); background: var(--surface); color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.nav-btn:hover:not(:disabled) { background: var(--surface2); color: var(--text); }
.nav-btn:disabled { opacity: 0.3; cursor: default; }
.nav-btn.primary { background: var(--text); border-color: var(--text); color: #fff; }
.nav-btn.primary:hover:not(:disabled) { background: #27272a; }
.nav-btn.primary:disabled { background: var(--text3); border-color: var(--text3); opacity: 1; }

#resultScreen { flex-direction: column; align-items: center; justify-content: flex-start; padding: 3rem 2rem; }
.result-inner { max-width: 700px; width: 100%; }
.result-header { text-align: center; margin-bottom: 1.75rem; }
.result-icon { width: 60px; height: 60px; background: var(--green-bg); border: 1px solid var(--green-border); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; }
.result-title { font-family: 'DM Serif Display', serif; font-size: 26px; font-weight: 400; margin-bottom: 6px; }
.result-sub { font-size: 14px; color: var(--text2); }

.submit-status { text-align: center; padding: 12px 18px; border-radius: var(--radius); margin-bottom: 1.5rem; font-size: 13px; display: none; }
.submit-status.visible { display: block; }
.submit-status.ok { background: var(--green-bg); border: 1px solid var(--green-border); color: var(--green); }
.submit-status.fail { background: var(--amber-bg); border: 1px solid var(--amber-border); color: var(--amber); }
.submit-status.pending { background: var(--accent-bg); border: 1px solid #bfdbfe; color: var(--accent); }

.result-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.5rem; }
.sum-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem 1rem; text-align: center; }
.sum-side { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 8px; }
.sum-count { font-family: 'DM Serif Display', serif; font-size: 38px; font-weight: 400; color: var(--text); }
.sum-pct { font-size: 13px; color: var(--text2); margin-top: 4px; }

.result-table { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 1.5rem; }
.rt-head { display: grid; grid-template-columns: 36px 1fr 88px; gap: 6px; padding: 9px 14px; background: var(--surface2); border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text3); }
.rt-scroll { max-height: 340px; overflow-y: auto; }
.rt-row { display: grid; grid-template-columns: 36px 1fr 88px; gap: 6px; padding: 9px 14px; border-bottom: 1px solid var(--border); align-items: center; font-size: 13px; cursor: pointer; transition: background 0.1s; }
.rt-row:last-child { border-bottom: none; }
.rt-row:hover { background: var(--bg); }
.rt-n { color: var(--text3); font-size: 11px; }
.rt-p { color: var(--text); line-height: 1.4; }
.chip { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 500; text-align: center; }
.ca { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
.cb { background: var(--accent-bg); color: var(--accent); border: 1px solid #bfdbfe; }
.cn { background: var(--surface2); color: var(--text3); border: 1px solid var(--border); }

.result-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.btn-o { padding: 11px 26px; border-radius: 40px; border: 1.5px solid var(--border2); background: var(--surface); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; transition: background 0.15s; }
.btn-o:hover { background: var(--surface2); }
.btn-f { padding: 11px 26px; border-radius: 40px; border: none; background: var(--text); color: #fff; font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; transition: background 0.15s; }
.btn-f:hover { background: #27272a; }

@media (max-width: 580px) {
  .intro-card { padding: 1.75rem; }
  .result-summary { grid-template-columns: 1fr; }
  .rt-head, .rt-row { grid-template-columns: 28px 1fr 70px; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="header-logo">人类<span>评测</span></div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-inner" id="pBar"></div></div>
      <div class="progress-label" id="pLabel">0 / 100</div>
    </div>
  </div>
</header>

<div class="screen active" id="introScreen">
  <div class="intro-card">
    <div class="intro-tag">用户研究 · 文本生成图像</div>
    <h1>图像偏好评测</h1>
    <p>本问卷将展示 <strong>100 组图片</strong>，每组的两张图由两个不同的模型根据同一段文字描述生成。</p>
    <div class="intro-tip">对每一组，<strong>直接点击你更喜欢的那张图</strong>即可，系统会自动跳到下一题。</div>
    <button class="start-btn" id="startBtn" onclick="startSurvey()">
      <span id="startBtnLabel">开始评测</span>
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
</div>

<div class="screen" id="questionScreen">
  <div class="q-wrap">
    <div class="q-card" id="qCard">
      <div class="q-prompt-bar">
        <div class="q-num-badge" id="qNumBadge">第 1 题 / 100</div>
        <div class="q-prompt-text" id="qPromptText"></div>
      </div>
      <div class="q-images">
        <div class="q-img-col" id="colA" onclick="vote('a')">
          <div class="q-img-wrap"><img id="imgA" src="" alt="图片 A" /><div class="img-label">图片 A</div></div>
          <div class="img-pick"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
        </div>
        <div class="q-img-col" id="colB" onclick="vote('b')">
          <div class="q-img-wrap"><img id="imgB" src="" alt="图片 B" /><div class="img-label">图片 B</div></div>
          <div class="img-pick"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
        </div>
      </div>
      <div class="q-hint">点击你更喜欢的那张图。</div>
    </div>
    <div class="q-nav">
      <button class="nav-btn" id="prevBtn" onclick="goTo(cur-1)" disabled>
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M13 8H3M7 12L3 8l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        上一题</button>
      <div class="nav-dots" id="navDots"></div>
      <button class="nav-btn primary" id="nextBtn" onclick="handleNext()">下一题
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>
</div>

<div class="screen" id="resultScreen">
  <div class="result-inner">
    <div class="result-header">
      <div class="result-icon"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#15803d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
      <h2 class="result-title">评测完成</h2>
      <p class="result-sub">感谢参与！下方是你的选择汇总。</p>
    </div>
    <div class="submit-status" id="submitStatus"></div>
    <div class="result-summary" id="summaryRow"></div>
    <div class="result-table">
      <div class="rt-head"><div>#</div><div>描述</div><div>更喜欢</div></div>
      <div class="rt-scroll" id="rtBody"></div>
    </div>
    <div class="result-actions">
      <button class="btn-o" onclick="backToSurvey()">← 回看答案</button>
      <button class="btn-f" onclick="exportCSV()">导出 CSV</button>
      <button class="btn-f" onclick="copyJSON()">复制 JSON</button>
    </div>
  </div>
</div>

<script>
const BASE_URL = 'https://cdn.jsdelivr.net/gh/sophialanlan/map-pgmap-humaneva@72f2ecad0bce0af180cda812bbff845596e18448/';
// Auto-submit endpoint (Google Apps Script web app URL).  Set after deploying GAS.
const SUBMIT_URL = 'https://script.google.com/macros/s/AKfycbwCYpQwvcNvwJPTqoF5KOL3s5PCavUWC2sGS9b8fFkJiVvQMluzYJ0nmpxTvnLqdZWPQw/exec';

const N = questions.length;
const answers = questions.map(() => null);
let cur = 0;
let sessionId = null;
function ensureSession() {
  if (sessionId) return sessionId;
  try {
    sessionId = sessionStorage.getItem('hev_sid');
    if (!sessionId) {
      sessionId = (crypto.randomUUID && crypto.randomUUID()) ||
        (Date.now().toString(36) + '-' + Math.random().toString(36).slice(2));
      sessionStorage.setItem('hev_sid', sessionId);
    }
  } catch(e) { sessionId = 'anon-' + Date.now(); }
  return sessionId;
}

function preloadAll(onProgress, onDone) {
  let done = 0;
  questions.forEach(q => {
    [q.imgA, q.imgB].forEach(src => {
      const img = new Image();
      img.onload = img.onerror = () => {
        done++;
        onProgress && onProgress(done, N * 2);
        if (done === N * 2) onDone && onDone();
      };
      img.src = BASE_URL + src;
    });
  });
}

function startSurvey() {
  ensureSession();
  const btn = document.getElementById('startBtn');
  const lbl = document.getElementById('startBtnLabel');
  btn.disabled = true;
  lbl.textContent = STR.preloading;
  preloadAll(
    (d, t) => { lbl.textContent = STR.preloading + ' (' + d + '/' + t + ')'; },
    () => {
      btn.disabled = false;
      lbl.textContent = STR.start_btn;
      show('questionScreen');
      buildDots();
      renderQ(0, 'none');
    }
  );
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function buildDots() {
  const wrap = document.getElementById('navDots');
  wrap.innerHTML = '';
  questions.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'nav-dot';
    d.id = 'dot-' + i;
    d.title = (STR.q_short || 'Q') + ' ' + (i + 1);
    d.onclick = () => goTo(i);
    wrap.appendChild(d);
  });
}

function renderQ(idx, dir) {
  cur = idx;
  const q = questions[idx];
  const card = document.getElementById('qCard');
  if (dir !== 'none') {
    card.style.opacity = '0';
    card.style.transform = dir === 'next' ? 'translateX(-28px)' : 'translateX(28px)';
  }
  setTimeout(() => {
    document.getElementById('qNumBadge').textContent = STR.q_badge.replace('{i}', idx + 1).replace('{n}', N);
    document.getElementById('qPromptText').innerHTML = STR.prompt_label + ': <strong>"' + q.prompt + '"</strong>';
    document.getElementById('imgA').src = BASE_URL + q.imgA;
    document.getElementById('imgB').src = BASE_URL + q.imgB;
    const colA = document.getElementById('colA'), colB = document.getElementById('colB');
    colA.classList.toggle('picked', answers[idx] === 'a');
    colB.classList.toggle('picked', answers[idx] === 'b');

    card.style.transition = 'none';
    card.style.opacity = '0';
    card.style.transform = dir === 'next' ? 'translateX(28px)' : (dir === 'prev' ? 'translateX(-28px)' : 'translateX(0)');
    requestAnimationFrame(() => {
      card.style.transition = 'opacity 0.22s ease, transform 0.22s ease';
      card.style.opacity = '1';
      card.style.transform = 'translateX(0)';
    });
    updateNav();
    updateProgress();
  }, dir === 'none' ? 0 : 80);
}

function vote(choice) {
  answers[cur] = choice;
  document.getElementById('colA').classList.toggle('picked', choice === 'a');
  document.getElementById('colB').classList.toggle('picked', choice === 'b');
  updateProgress();
  updateDots();
  if (cur < N - 1) {
    setTimeout(() => goTo(cur + 1, 'next'), 280);
  } else {
    updateNav();
  }
}

function goTo(idx, dir) {
  if (idx < 0 || idx >= N) return;
  const direction = dir || (idx > cur ? 'next' : 'prev');
  renderQ(idx, direction);
}

function handleNext() {
  if (cur < N - 1) goTo(cur + 1, 'next');
  else showResult();
}

function updateNav() {
  document.getElementById('prevBtn').disabled = cur === 0;
  const nextBtn = document.getElementById('nextBtn');
  const allDone = answers.every(a => a !== null);
  const arrow = '<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  if (cur === N - 1) {
    nextBtn.innerHTML = STR.nav_submit + ' ' + arrow;
    nextBtn.disabled = !allDone;
  } else {
    nextBtn.innerHTML = STR.nav_next + ' ' + arrow;
    nextBtn.disabled = false;
  }
  updateDots();
}

function updateDots() {
  questions.forEach((_, i) => {
    const d = document.getElementById('dot-' + i);
    if (!d) return;
    d.className = 'nav-dot';
    if (i === cur) d.classList.add('current');
    else if (answers[i] !== null) d.classList.add('done');
  });
}

function updateProgress() {
  const done = answers.filter(a => a !== null).length;
  document.getElementById('pBar').style.width = (done / N * 100) + '%';
  document.getElementById('pLabel').textContent = done + ' / ' + N;
  updateDots();
  updateNav();
}

async function submitToEndpoint() {
  if (!SUBMIT_URL || SUBMIT_URL.startsWith('__')) return 'skipped';
  const status = document.getElementById('submitStatus');
  status.className = 'submit-status visible pending';
  status.textContent = STR.submit_pending;
  ensureSession();
  const payload = {
    locale: document.documentElement.lang,
    session_id: sessionId,
    user_agent: (navigator.userAgent || '').slice(0, 200),
    timestamp: new Date().toISOString(),
    answers: questions.map((q, i) => ({ q: i + 1, picked: answers[i] }))
  };
  try {
    const resp = await fetch(SUBMIT_URL, {
      method: 'POST',
      body: new URLSearchParams({ data: JSON.stringify(payload) }),
    });
    if (resp.ok) {
      status.className = 'submit-status visible ok';
      status.textContent = STR.submit_ok;
      return 'ok';
    }
    throw new Error('HTTP ' + resp.status);
  } catch (e) {
    console.error('submit error:', e);
    status.className = 'submit-status visible fail';
    status.textContent = STR.submit_fail;
    return 'fail';
  }
}

async function showResult() {
  let a = 0, b = 0;
  answers.forEach(v => { if (v === 'a') a++; else if (v === 'b') b++; });
  const tot = a + b;
  const pctA = tot ? Math.round(a / tot * 100) : 0;
  const pctB = tot ? Math.round(b / tot * 100) : 0;
  document.getElementById('summaryRow').innerHTML =
    '<div class="sum-box"><div class="sum-side">' + STR.choice_a + '</div>'
    + '<div class="sum-count">' + a + '</div><div class="sum-pct">' + pctA + '%</div></div>'
    + '<div class="sum-box"><div class="sum-side">' + STR.choice_b + '</div>'
    + '<div class="sum-count">' + b + '</div><div class="sum-pct">' + pctB + '%</div></div>';

  const chipCls = v => v==='a'?'ca':v==='b'?'cb':'cn';
  const chipTxt = v => v==='a'?STR.choice_a:v==='b'?STR.choice_b:'—';
  document.getElementById('rtBody').innerHTML = questions.map((q,i) => {
    const v = answers[i];
    const short = q.prompt.length > 56 ? q.prompt.slice(0,56)+'…' : q.prompt;
    return '<div class="rt-row" onclick="goToQ(' + i + ')">'
      + '<div class="rt-n">' + (i+1) + '</div><div class="rt-p">' + short + '</div>'
      + '<div><span class="chip ' + chipCls(v) + '">' + chipTxt(v) + '</span></div></div>';
  }).join('');
  show('resultScreen');
  submitToEndpoint();
}

function goToQ(i) { show('questionScreen'); renderQ(i, 'none'); }
function backToSurvey() { show('questionScreen'); renderQ(cur, 'none'); }

function exportCSV() {
  let csv = 'index,prompt,preferred\n';
  questions.forEach((q,i) => {
    csv += (i+1) + ',"' + q.prompt.replace(/"/g,'""') + '",' + (answers[i]||'') + '\n';
  });
  const url = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
  const l = document.createElement('a');
  l.href=url; l.download='human_eval_results.csv'; l.click();
  URL.revokeObjectURL(url);
}

function copyJSON() {
  const data = questions.map((q,i) => ({
    index: i+1, prompt: q.prompt, preferred: answers[i]
  }));
  navigator.clipboard.writeText(JSON.stringify(data,null,2)).then(() => {
    const btn = document.querySelector('.result-actions .btn-f:last-child');
    const orig = btn.textContent;
    btn.textContent = STR.copied;
    setTimeout(() => btn.textContent = orig, 2000);
  });
}
</script>
